site_name: molgenis-flwr-armadillo
site_url: https://molgenis.github.io/molgenis-flwr-armadillo/
repo_name: molgenis-flwr-armadillo
repo_url: https://github.com/molgenis/molgenis-flwr-armadillo

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Vignettes:
      - Token Routing: vignettes/token-routing.md
      - Loading Data: vignettes/loading-data.md
  - Reference: reference.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            members_order: source
